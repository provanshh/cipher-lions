<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Blocked by CipherGuard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 24px 20px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.6);
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }
    p {
      font-size: 0.9rem;
      color: #9ca3af;
      margin: 0 0 16px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(248, 113, 113, 0.12);
      color: #fecaca;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .domain {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.9rem;
      color: #f97373;
      word-break: break-all;
    }
    button {
      margin-top: 16px;
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      background: #f97316;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover {
      background: #ea580c;
    }
    audio {
      width: 100%;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="pill">
      <span>🛡️</span>
      <span>Protected by CipherGuard</span>
    </div>
    <h1>This website isn't allowed right now</h1>
    <p id="domainText"></p>
    <p id="messageText">
      Your parent has blocked this website. Please close this tab or go back to an allowed site.
    </p>
    <audio id="voiceWarning" controls style="display: none;"></audio>
    <button id="closeBtn">Close this tab</button>
  </div>

  <script src="warning.js"></script>
</body>
</html>
