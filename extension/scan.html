<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Scan QR - CipherGuard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #aaa; margin: 0 0 20px; }
    #videoContainer {
      position: relative;
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      margin-bottom: 20px;
    }
    #video {
      width: 100%;
      display: block;
    }
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      border: 3px solid rgba(124, 58, 237, 0.6);
      border-radius: 12px;
      pointer-events: none;
    }
    #success {
      display: none;
      padding: 24px;
      background: rgba(34, 197, 94, 0.2);
      border: 2px solid #22c55e;
      border-radius: 12px;
      color: #22c55e;
      font-weight: bold;
      margin-bottom: 16px;
    }
    #error {
      display: none;
      padding: 16px;
      background: rgba(239, 68, 68, 0.2);
      border: 2px solid #ef4444;
      border-radius: 8px;
      color: #ef4444;
      margin-bottom: 16px;
    }
    button {
      padding: 12px 24px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <h1>Scan to Connect</h1>
  <p>Point your camera at the QR code on the setup screen</p>
  <div id="videoContainer">
    <video id="video" autoplay playsinline muted></video>
    <div id="overlay"></div>
  </div>
  <div id="success">Token captured! Close this tab and enter your password in the extension.</div>
  <div id="error"></div>
  <button id="closeBtn" style="display: none;">Close</button>
  <script src="scan.js"></script>
</body>
</html>
