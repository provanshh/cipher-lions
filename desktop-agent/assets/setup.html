<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cipher Agent - Setup</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background: #1a1a2e;
      color: #eee;
      min-width: 320px;
    }
    h2 { margin-top: 0; font-size: 18px; }
    p { color: #aaa; font-size: 13px; margin: 8px 0 16px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0 12px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #0f0f1a;
      color: #fff;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #4a90d9; }
    button {
      width: 100%;
      padding: 12px;
      background: #4a90d9;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    .error { color: #e74c3c; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>Cipher Desktop Agent Setup</h2>
  <p>Set a parent password. This password is required to quit or uninstall the agent.</p>
  <form id="form">
    <input type="password" id="pw1" placeholder="Enter password (min 6 chars)" autocomplete="new-password" required>
    <input type="password" id="pw2" placeholder="Confirm password" autocomplete="new-password" required>
    <div id="err" class="error"></div>
    <button type="submit">Set Password & Start Agent</button>
  </form>
  <script>
    const form = document.getElementById("form");
    const pw1 = document.getElementById("pw1");
    const pw2 = document.getElementById("pw2");
    const err = document.getElementById("err");
    form.onsubmit = async (e) => {
      e.preventDefault();
      err.textContent = "";
      if (pw1.value.length < 6) {
        err.textContent = "Password must be at least 6 characters";
        return;
      }
      if (pw1.value !== pw2.value) {
        err.textContent = "Passwords do not match";
        return;
      }
      const ok = await window.cipherAgent.setPassword(pw1.value);
      if (ok) window.close();
    };
  </script>
</body>
</html>
