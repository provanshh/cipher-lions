<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cipher Agent - Verify</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background: #1a1a2e;
      color: #eee;
      min-width: 300px;
    }
    h2 { margin-top: 0; font-size: 18px; }
    p { color: #aaa; font-size: 13px; margin: 8px 0 16px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0 12px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #0f0f1a;
      color: #fff;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #4a90d9; }
    button {
      width: 100%;
      padding: 12px;
      background: #4a90d9;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button:hover { background: #357abd; }
    .secondary { background: #444; }
    .secondary:hover { background: #555; }
    .error { color: #e74c3c; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <h2 id="title">Enter Parent Password</h2>
  <p id="desc">Password is required to quit the agent.</p>
  <form id="form">
    <input type="password" id="pw" placeholder="Parent password" autocomplete="current-password" required>
    <div id="err" class="error"></div>
    <button type="submit">Verify</button>
    <button type="button" id="cancel" class="secondary">Cancel</button>
  </form>
  <script>
    const form = document.getElementById("form");
    const pw = document.getElementById("pw");
    const err = document.getElementById("err");
    const cancel = document.getElementById("cancel");
    const action = (window.location.hash || "#quit").slice(1).split("?")[0] || "quit";
    if (action === "uninstall") {
      document.getElementById("title").textContent = "Uninstall Agent";
      document.getElementById("desc").textContent = "Enter parent password to proceed with uninstall instructions.";
    }
    form.onsubmit = async (e) => {
      e.preventDefault();
      err.textContent = "";
      const ok = await window.cipherAgent.verifyPassword(pw.value);
      if (ok) {
        window.cipherAgent.onVerified();
        window.close();
      } else {
        err.textContent = "Incorrect password";
      }
    };
    cancel.onclick = () => window.close();
  </script>
</body>
</html>
